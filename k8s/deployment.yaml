apiVersion: apps/v1
kind: Deployment

metadata:
  name: hostel-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hostel-api

  template:
    metadata:
      labels:
        app: hostel-api

    spec:
      containers:
        - name: hostel-api
          image: gnanasundar126/hostel-demo-app:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hostel-db-secret
                  key: DATABASE_URL

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: hostel-config
                  key: PORT

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: hostel-config
                  key: NODE_ENV

            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: hostel-config
                  key: APP_NAME